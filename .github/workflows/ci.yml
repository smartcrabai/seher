name: PR Auto-merge

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install taplo
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2
        with:
          tool: taplo-cli

      - name: Lint Cargo.toml files
        run: taplo lint Cargo.toml crates/*/Cargo.toml

      - name: Check Cargo.toml formatting
        run: taplo fmt --check --option reorder_keys=true Cargo.toml crates/*/Cargo.toml

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run cargo check
        run: cargo check --all-features --locked

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Check formatting
        run: cargo fmt -- --check

