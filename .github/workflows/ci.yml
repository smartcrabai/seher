name: PR Auto-merge

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install taplo
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: taplo-cli

      - name: Lint Cargo.toml files
        run: taplo lint Cargo.toml crates/*/Cargo.toml

      - name: Check Cargo.toml formatting
        run: taplo fmt --check --option reorder_keys=true Cargo.toml crates/*/Cargo.toml

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run cargo check
        run: cargo check --all-features --locked

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Check formatting
        run: cargo fmt -- --check

